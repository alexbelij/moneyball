# keepalive.yml | v1.0.0 | 2026-06-12
# Pings the Render free-tier backend every 10 min so it never cold-starts
# during the hackathon demo window. DELETE after the hackathon (saves
# GitHub Actions minutes on the private repo).
name: keepalive
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health
        run: curl -fsS -m 90 --retry 2 https://moneyball-backend-axzr.onrender.com/health
