# ci | v0.1.0 | 2026-06-12
# Typecheck + full test suite on every push/PR. Node 20 + pnpm (vitest needs
# node to fork workers; local bun users can run `pnpm -C apps/backend test:bun`).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false

      - name: Typecheck backend
        run: pnpm -C apps/backend exec tsc -p tsconfig.json --noEmit

      - name: Typecheck sleep-worker
        run: pnpm -C sleep-worker exec tsc -p tsconfig.json --noEmit

      - name: Backend tests (vitest)
        run: pnpm -C apps/backend exec vitest run

      - name: Sleep-worker regression tests
        run: pnpm -C sleep-worker exec tsx test/regressions.ts

      - name: Sleep-worker e2e simulation
        run: pnpm -C sleep-worker exec tsx test/simulation.ts
