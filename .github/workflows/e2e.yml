# e2e | v1.0.0 | 2026-06-13
# T21: Playwright e2e smoke tests in CI.
# Builds frontend with vite, serves via preview, runs against api-stub.
name: E2E Smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - name: Build frontend
        run: pnpm -C apps/frontend exec vite build
        env:
          VITE_API_URL: http://localhost:4001
          VITE_SOCKET_URL: http://localhost:4001

      - name: Install Playwright browsers
        run: pnpm -C apps/frontend exec playwright install --with-deps chromium

      - name: Run e2e smoke tests
        run: pnpm -C apps/frontend exec playwright test
        env:
          VITE_API_URL: http://localhost:4001
          VITE_SOCKET_URL: http://localhost:4001

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: apps/frontend/e2e/screenshots/
          retention-days: 14

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 14
