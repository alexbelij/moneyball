    <!-- T47: JSON-LD structured data -->
    <script type="application/ld+json">

            "@type": "Offer",

          ]

    <!-- T13: preload critical assets -->
    <link rel="preload" as="image" href="/assets/backgrounds/room_v4.webp" />
    <link rel="preload" as="fetch" href="/assets/props/props.json" crossorigin />
    <link rel="preload" as="fetch" href="/assets/props/props_manifest.json" crossorigin />

    <!-- T13-fix: self-hosted pixel fonts (design-spec: NO CDN, works offline from Walrus) -->
    <link rel="stylesheet" href="/assets/fonts/fonts.css" />
    <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/PressStart2P-Latin.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/VT323-Latin.woff2" crossorigin />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0c0c0c; overflow: hidden; font-family: 'VT323', 'Press Start 2P', monospace; color: #f4ede2; }
      #root { width: 100vw; height: 100vh; touch-action: manipulation; }

      /* P0: Custom scrollbar — pixel-art styled */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #0c0c0c; }
      ::-webkit-scrollbar-thumb { background: #341d0e; border: 1px solid #4e2912; }
      ::-webkit-scrollbar-thumb:hover { background: #4e2912; }
      ::-webkit-scrollbar-corner { background: #0c0c0c; }
      * { scrollbar-width: thin; scrollbar-color: #341d0e #0c0c0c; }

      /* P0: Selection color */
      ::selection { background: #e8a44a; color: #181009; }

      /* P0: Image rendering for pixel art */
      img, canvas { image-rendering: pixelated; image-rendering: crisp-edges; }

      /* P0: CRT scanline + vignette overlay (classes used by CrtOverlay.tsx) */
      .crt-scanlines {
        position: absolute; inset: 0; pointer-events: none; z-index: 1;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
        opacity: 0.04; animation: crt-flicker 4s steps(2) infinite;
        mix-blend-mode: multiply;
      }
      .crt-vignette {
        position: absolute; inset: 0; pointer-events: none; z-index: 1;
        background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
        opacity: 0.5;
      }
      @keyframes crt-flicker { 0% { opacity: 0.03; } 50% { opacity: 0.05; } 100% { opacity: 0.03; } }
      @media (prefers-reduced-motion: reduce) {
        .crt-scanlines { animation: none !important; opacity: 0.03 !important; }
      }

      .noscript {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #0c0c0c; color: #f4ede2;
        padding: 24px; text-align: center;
        font-family: 'VT323', monospace;
      }
      .noscript-box {
        max-width: 520px;
        border: 2px solid #3a3020;
        border-radius: 0;
        padding: 16px 18px;
        background: #181009;
        box-shadow: 4px 4px 0 #000;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div class="noscript">
        <div class="noscript-box">
          <h1 style="margin: 0 0 8px; font-size: 12px; font-family: 'Press Start 2P', monospace; color: #e8a44a; letter-spacing: -0.5px;">JavaScript is required</h1>
          <p style="margin: 0; font-size: 18px; color: #d5cec0;">
            Moneyball Cabinet is an interactive web app (React + Phaser). Please enable JavaScript and reload.
          </p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      /* Block Ctrl+wheel and pinch zoom to keep pixel-art layout stable (#24) */
      document.addEventListener('wheel', function(e) {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    </script>
  </body>
</html>
