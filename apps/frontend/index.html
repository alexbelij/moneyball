<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moneyball Cabinet</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #1a1a2e; overflow: hidden; font-family: Inter, system-ui, sans-serif; }
      #root { width: 100vw; height: 100vh; }
      .noscript {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #0b1020; color: #e5e7eb;
        padding: 24px; text-align: center;
        font-family: system-ui, sans-serif;
      }
      .noscript-box {
        max-width: 520px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px;
        padding: 16px 18px;
        background: rgba(255,255,255,0.04);
      }
    </style>
  </head>
  <body>
    <noscript>
      <div class="noscript">
        <div class="noscript-box">
          <h1 style="margin: 0 0 8px; font-size: 18px;">JavaScript is required</h1>
          <p style="margin: 0; opacity: 0.9;">
            Moneyball Cabinet is an interactive web app (React + Phaser). Please enable JavaScript and reload.
          </p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
